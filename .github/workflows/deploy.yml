name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # ทำงานทุกครั้งที่ push ขึ้น main

jobs:
  deploy:
    runs-on: ubuntu-latest # รันบน server ของ GitHub

    steps:
      # 1. โหลด code จาก repo มา
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ติดตั้ง Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. ติดตั้ง dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build project
      - name: Build
        run: npm run build

      # 5. Deploy ไฟล์ dist/ ขึ้น GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
